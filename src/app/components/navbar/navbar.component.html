<header class="nav" [class.nav--scrolled]="scrolled()">
  <div class="nav__progress" [style.width.%]="spy.progress()" aria-hidden="true"></div>
  <nav class="container nav__row glass" aria-label="Primary">
    <a href="#home" class="nav__brand" (click)="closeMenu()">
      <span class="nav__brand-mark" aria-hidden="true"></span>
      <span class="nav__brand-text">M. Abdullah</span>
    </a>

    <ul id="mobile-nav" class="nav__links" [class.nav__links--open]="menuOpen()">
      <li *ngFor="let link of links">
        <a
          [href]="'#' + link.href"
          class="nav__link"
          [class.nav__link--active]="isActive(link.href)"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      </li>
      <li class="nav__cta-mobile">
        <a href="#contact" class="btn btn-primary" (click)="closeMenu()">Let's talk</a>
      </li>
    </ul>

    <div class="nav__actions">
      <button
        type="button"
        class="nav__theme-btn"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <svg *ngIf="theme.theme() === 'dark'" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/>
          <path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
        </svg>
        <svg *ngIf="theme.theme() === 'light'" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z"/>
        </svg>
      </button>

      <a href="#contact" class="btn btn-primary nav__cta-desktop">Let's talk</a>

      <button
        type="button"
        class="nav__burger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Toggle navigation menu"
        aria-controls="mobile-nav"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
</header>
