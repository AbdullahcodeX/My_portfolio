<footer class="footer">
  <div class="container footer__grid">
    <div>
      <p class="footer__brand">{{ profile.name }}</p>
      <p class="footer__tagline">{{ profile.resumeNote }}</p>
    </div>

    <nav aria-label="Footer">
      <ul class="footer__links">
        <li *ngFor="let link of links"><a [href]="'#' + link.href">{{ link.label }}</a></li>
      </ul>
    </nav>

    <div class="footer__socials">
      <a [href]="profile.linkedin" target="_blank" rel="noopener">LinkedIn</a>
      <a [href]="profile.github" target="_blank" rel="noopener">GitHub</a>
      <a [href]="'mailto:' + profile.email">Email</a>
    </div>
  </div>

  <div class="container footer__bottom">
    <p>© {{ year }} {{ profile.name }}. Built with Angular.</p>
    <a href="#home" class="footer__top">Back to top ↑</a>
  </div>
</footer>
