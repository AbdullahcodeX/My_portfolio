<section id="about" class="section about" [appSectionSpy]="'about'">
  <div class="container about__grid">
    <div class="about__copy">
      <div class="section-head" appReveal="up">
        <p class="eyebrow">{{ data.eyebrow }}</p>
        <h2 class="section-title">{{ data.heading }}</h2>
      </div>

      <p
        class="about__p"
        *ngFor="let para of data.paragraphs; let i = index"
        appReveal="up"
        [revealDelay]="i * 90"
      >
        {{ para }}
      </p>
    </div>

    <aside class="about__stats" appReveal="left">
      <div class="about__stat glass" *ngFor="let stat of data.stats">
        <span class="about__stat-value gradient-text">{{ stat.value }}</span>
        <span class="about__stat-label">{{ stat.label }}</span>
      </div>
    </aside>
  </div>
</section>
